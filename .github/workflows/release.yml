# 發版自動化 — `git tag vX.Y.Z && git push --tags` 觸發。
#
# 在 Ubuntu 出 `.deb` + `.AppImage`,在 Windows 出 `.msi` + `.nsis (.exe)`,
# 全部上傳到 GitHub Release(draft 狀態,你 review 後再 publish)。
#
# 同事拿安裝檔直接從 Release 頁下載,你不用拷檔案。
#
# 預期耗時:第一次 ~25-35 min(release profile + LTO);有 cache 之後
# ~10-15 min(主要是 LLM dep + whisper.cpp 一次 cache,Tauri bundle 也快)。

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (for manual reruns, e.g. v0.7.3)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

# tauri-action 需要 contents: write 才能建 Release / 上傳 artifacts。
permissions:
  contents: write

jobs:
  build:
    strategy:
      # 一個平台 build fail 不擋另一個 — 半套 release 總比沒 release 好,
      # 失敗那邊事後手動補。
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      # ── Rust toolchain + cache ──────────────────────────────────────────
      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # ── Ubuntu 系統 deps(走 repo 自帶 script,同 check.yml) ────────────
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: sudo bash scripts/install-linux-deps.sh

      # ── Node / frontend ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      # ── Tauri build + GitHub Release upload ─────────────────────────────
      # 手動跑 Tauri CLI,避免 release 卡在第三方 GitHub Action archive 下載。
      # `releaseDraft: true` 的等效流程:
      #   1. 確保 draft Release 存在
      #   2. build bundle
      #   3. 上傳 installers 到該 draft Release
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" \
            --draft \
            --title "Mori $RELEASE_TAG" \
            --notes "Voice-driven desktop AI companion — see README for setup."

      - name: Build Tauri app
        working-directory: crates/mori-tauri
        shell: bash
        run: |
          npm --prefix ../.. run build
          npx --prefix ../.. tauri build --ci --config '{"build":{"beforeBuildCommand":""}}' ${{ matrix.args }}

      - name: Upload installers to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find target/release/bundle -type f \( \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.rpm' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under target/release/bundle" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
