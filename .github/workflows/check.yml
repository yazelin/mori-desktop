# Cross-platform compile gate — 防止「在 Ubuntu 改 code 把 Windows path 弄壞」
# 或反過來的 regression。每次 push 到 main / PR 開或更新時跑。
#
# 不跑 `cargo test`(部分 test shell-out 平台特定工具),不跑 clippy / fmt
# (codebase 尚未全 clean,之後加)。目標單純:「workspace 在兩個平台都能
# 編過」。
#
# 預期耗時:第一次 ~10-15 min(無 cache);之後 ~3-5 min(rust-cache 命中)。

name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 不需要 write 任何東西 — 只是讀 repo + report status。
permissions:
  contents: read

jobs:
  check:
    strategy:
      # 一邊掛掉另一邊繼續跑,你才能同時看到兩條 log。
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 快取 target/ 跟 ~/.cargo/registry,後續 PR / push 走 incremental。
      # key 自動含 OS + Cargo.lock hash,Linux 跟 Windows 各自獨立。
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Ubuntu 系統 deps(走 repo 自帶 script,單一可信來源) ───────────
      # `scripts/install-linux-deps.sh` 跟本機 dev / CI / docs 三邊同步,
      # 改 deps 跟改 code 進同一個 commit。
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo bash scripts/install-linux-deps.sh

      # Windows runner(`windows-latest`)已預裝 Visual Studio 2022 Build
      # Tools + Windows SDK,MSVC linker / windows crate 都直接可用。
      # whisper-rs 已 cfg(target_os = "linux") gate 掉,Windows build 不
      # 會碰 cmake / libclang。所以這步什麼都不做。

      # ── Node / frontend ─────────────────────────────────────────────────
      # 必須先 `npm run build` 產出 `dist/`,因為 `tauri::generate_context!()`
      # 在 cargo build 時會檢查這個路徑存在。
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Build frontend (dist/)
        run: npm run build

      # ── Cargo check ─────────────────────────────────────────────────────
      # --all-targets:同時 check lib / bin / tests / examples。
      # --workspace:三個 crates 全部(mori-core / mori-tauri / mori-cli)。
      - name: Cargo check workspace
        run: cargo check --workspace --all-targets
