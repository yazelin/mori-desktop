# Cross-platform verification gate — 防止「在 Ubuntu 改 code 把 Windows path 弄壞」
# 或反過來的 regression。每次 push 到 main / PR 開或更新時跑。
#
# CI 跟本機 / Codex Cloud / Claude Code 共用 `scripts/verify.sh`,避免不同
# agent 各自猜驗證命令。fmt / clippy 目前仍是 opt-in strict mode,因為既有
# codebase 尚未全 clean。
#
# 預期耗時:第一次 ~10-15 min(無 cache);之後 ~3-5 min(rust-cache 命中)。

name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 不需要 write 任何東西 — 只是讀 repo + report status。
permissions:
  contents: read

jobs:
  check:
    strategy:
      # 一邊掛掉另一邊繼續跑,你才能同時看到兩條 log。
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # ── Ubuntu 系統 deps(走 repo 自帶 script,單一可信來源) ───────────
      # `scripts/install-linux-deps.sh` 跟本機 dev / CI / docs 三邊同步,
      # 改 deps 跟改 code 進同一個 commit。
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo bash scripts/install-linux-deps.sh

      # Windows runner(`windows-latest`)已預裝 Visual Studio 2022 Build
      # Tools + Windows SDK,MSVC linker / windows crate 都直接可用。
      # whisper-rs 已 cfg(target_os = "linux") gate 掉,Windows build 不
      # 會碰 cmake / libclang。所以這步什麼都不做。

      # ── Node / frontend ─────────────────────────────────────────────────
      # 必須先 `npm run build` 產出 `dist/`,因為 `tauri::generate_context!()`
      # 在 cargo build 時會檢查這個路徑存在。
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      # ── Shared verification ─────────────────────────────────────────────
      # 同時服務 CI / 本機 / cloud agents:
      # - npm run build (tsc + vite + mori-cli prebuild)
      # - cargo test -p mori-core --lib (stable unit-test subset)
      # - cargo check --workspace --all-targets (三個 crates 全部)
      - name: Verify
        shell: bash
        run: bash scripts/verify.sh
